# config.yaml for the spec at
# ../src/crow_acp/agent/config.py
mcpServers:
  crow-mcp:
    transport: stdio
    command: uvx
    args:
      - crow-mcp

###########################################################
# DO NOT EDIT THIS FILE
# run `crow-cli init` and follow the prompts
# this will generate a config.yaml file in
# -  ~/.crow/config.yaml
#
# Modify that file for hot fixes to coding agents run
# with default config directory
#
# I highly recommand running `crow-cli init` to
# fill this out to define your models
# and come back to it frequently as you decided to use
# postgres or whatever
###########################################################

# db_uri: postgresql://postgres:${POSTGRES_PASSWORD}@localhost:${POSTGRES_PORT}/postgres
db_uri: sqlite:///${HOME}/.crow/crow.db

# This you're basically just filling out yourself with
# the little tool I give
# providers:
#   placeholder-provider:
#     api_key: ${PLACEHOLDER_API_KEY}
#     base_url: https://example.com/v1

# Filling these parts out is actually useful
# let crow-cli init do it's thing
# models:
#   placeholder-model:
#     provider: placeholder-provider
#     model: gpt-3.5-turbo

# If you're on mac and your UI looks like shit
# CHANGE THESE IN ~/.crow/config.yaml
# often times they'll just be `terminal`
TERMINAL_TOOL: crow-mcp_terminal
WRITE_TOOL: crow-mcp_write
READ_TOOL: crow-mcp_read
EDIT_TOOL: crow-mcp_edit
SEARCH_TOOL: crow-mcp_web_search
FETCH_TOOL: crow-mcp_web_fetch

# Compaction parameters
MAX_COMPACT_TOKENS: 120000
N_STEPS_BACK_COMPACT: 8

max_steps_per_turn: 100
max_retries_per_step: 3
