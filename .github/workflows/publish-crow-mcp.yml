name: Publish crow-mcp to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/crow-mcp
    permissions:
      id-token: write  # Required for trusted publishing
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "crow-mcp/pyproject.toml"

      - name: Build package
        working-directory: ./crow-mcp
        run: uv build

      - name: Publish to PyPI
        working-directory: ./crow-mcp
        run: uv publish
